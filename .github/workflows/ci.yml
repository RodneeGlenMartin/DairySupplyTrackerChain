name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: dairy_supplychain
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libpq-dev build-essential postgresql-client

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Database Schema and Dynamic Provisioner
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dairy_supplychain
      run: |
        PGPASSWORD=postgres psql -h localhost -U postgres -d dairy_supplychain -f db/schema.sql
        python db/dynamic_provisioner.py

    - name: Run SWEBOK Test Suite
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dairy_supplychain
        DISABLE_IN_MEMORY_FALLBACK: "true"
      run: |
        pytest -v

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Multi-Stage Production Docker Image
      run: |
        docker build --target runner -t pcc-usm-registry.edu.ph/dairy/coldchain-tracker:latest .
