apiVersion: apps/v1
kind: Deployment
metadata:
  name: coldchain-tracker-deployment
  namespace: dairy-supplychain
  labels:
    app: coldchain-tracker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: coldchain-tracker
  template:
    metadata:
      labels:
        app: coldchain-tracker
    spec:
      containers:
      - name: tracker-service
        image: pcc-usm-registry.edu.ph/dairy/coldchain-tracker:v2.1.0
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "1.0"
            memory: "1024Mi"
          requests:
            cpu: "0.5"
            memory: "512Mi"
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: connection-string
        - name: KINETIC_MODEL_ACTIVATION_ENERGY
          value: "64000"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: coldchain-tracker-service
  namespace: dairy-supplychain
spec:
  selector:
    app: coldchain-tracker
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
